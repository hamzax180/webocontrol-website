<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — WEBOCONTROL</title>
    <link rel="stylesheet" href="/index.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <script src="/js/i18n.js" defer></script>
</head>

<body class="home-page has-video-bg">
    <!-- Register Video Background -->
    <div class="video-background-container">
        <video autoplay loop muted playsinline class="bg-vid">
            <source src="/images/login%20html.mp4" type="video/mp4">
        </video>
    </div>

    <div class="auth-page">
        <div class="hero-glow hero-glow-1"></div>
        <div class="hero-glow hero-glow-2"></div>

        <div class="auth-card">
            <a href="/" class="nav-logo anim-forever-logo"
                style="justify-content:center; margin-bottom:32px; text-decoration: none;">
                <div class="logo-main">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L3 20H7.5L12 11L16.5 20H21L12 2Z" fill="url(#antigravity-grad)" />
                        <defs>
                            <linearGradient id="antigravity-grad" x1="3" y1="20" x2="21" y2="2"
                                gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#4285F4" />
                                <stop offset="50%" stop-color="#EA4335" />
                                <stop offset="100%" stop-color="#FBBC05" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
            </a>
            <h2 data-i18n="register_title">Create Account</h2>
            <p class="auth-subtitle" data-i18n="register_subtitle">Sign up to start ordering your website</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name" data-i18n="full_name">Full Name</label>
                    <input type="text" id="name" class="form-control" data-i18n-placeholder="ph_name"
                        placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email" data-i18n="email_label">Email Address</label>
                    <input type="email" id="email" class="form-control" data-i18n-placeholder="ph_email"
                        placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password" data-i18n="password_label">Password</label>
                    <input type="password" id="password" class="form-control" data-i18n-placeholder="ph_min_6"
                        placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword" data-i18n="confirm_password">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control"
                        data-i18n-placeholder="ph_confirm_password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-large" style="width:100%; margin-top:8px;"
                    data-i18n="btn_create_account">
                    Create Account →
                </button>
                <div class="form-message" id="registerMessage"></div>
            </form>

            <div class="auth-footer">
                <span data-i18n="have_account">Already have an account?</span> <a href="/login.html"
                    data-i18n="signin_here">Sign in</a>
            </div>
        </div>
    </div>

    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/auth.js"></script>
</body>

</html>
