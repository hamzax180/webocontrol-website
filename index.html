<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // Check if we are already in the frontend directory to avoid loops (unlikely but safe)
        if (!window.location.pathname.startsWith('/frontend/')) {
            window.location.href = '/frontend/';
        }
    </script>
</head>
<body>
    <p>Redirecting to WeboControl... If you are not redirected, <a href="/frontend/">click here</a>.</p>
</body>
</html>
