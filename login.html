<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — WEBOCONTROL</title>
    <link rel="stylesheet" href="/index.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <script src="/js/i18n.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>

<body class="home-page has-video-bg">
    <!-- Login Video Background -->
    <div class="video-background-container">
        <video autoplay loop muted playsinline class="bg-vid">
            <source src="/images/login%20html.mp4" type="video/mp4">
        </video>
    </div>

    <div class="auth-page">
        <div class="hero-glow hero-glow-1"></div>
        <div class="hero-glow hero-glow-2"></div>

        <div class="auth-card">
            <a href="/" class="nav-logo anim-forever-logo"
                style="justify-content:center; margin-bottom:32px; text-decoration: none;">
                <div class="logo-main">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L3 20H7.5L12 11L16.5 20H21L12 2Z" fill="url(#antigravity-grad)" />
                        <defs>
                            <linearGradient id="antigravity-grad" x1="3" y1="20" x2="21" y2="2"
                                gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#4285F4" />
                                <stop offset="50%" stop-color="#EA4335" />
                                <stop offset="100%" stop-color="#FBBC05" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
            </a>
            <h2 data-i18n="login_welcome">Welcome Back</h2>
            <p class="auth-subtitle" data-i18n="login_subtitle">Sign in to manage your orders</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email" data-i18n="email_label">Email Address</label>
                    <input type="email" id="email" class="form-control" data-i18n-placeholder="ph_email"
                        placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password" data-i18n="password_label">Password</label>
                    <input type="password" id="password" class="form-control" data-i18n-placeholder="ph_password"
                        placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-large" style="width:100%; margin-top:8px;"
                    data-i18n="btn_signin">
                    Sign In →
                </button>
                <div class="form-message" id="loginMessage"></div>
            </form>

            <div class="auth-footer">
                <span data-i18n="no_account">Don't have an account?</span> <a href="/register.html"
                    data-i18n="register_here">Register here</a>
            </div>
        </div>
    </div>

    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/auth.js"></script>
</body>

</html>
